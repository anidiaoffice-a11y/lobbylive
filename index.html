<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LobbyLive DEV</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;

      background:#050505;

      color:white;

      font-family:Arial,sans-serif;
    }

    header{
      position:fixed;

      top:0;
      left:0;
      right:0;

      height:80px;

      background:#0b0b10;

      border-bottom:1px solid #1d1d28;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 18px;

      z-index:100;
    }

    .logo{
      font-size:32px;
      font-weight:800;
    }

    .logo span{
      color:#d88b63;
    }

    header input{
      width:220px;

      background:#16161f;

      border:none;

      color:white;

      padding:12px 16px;

      border-radius:999px;
    }

    main{
      padding-top:120px;
      padding-bottom:120px;

      width:100%;
      max-width:1200px;

      margin:auto;
    }

    main h2{
      padding-left:20px;
      color:#ddd;
    }

    .placeholder{
      margin:20px;

      height:400px;

      border:1px dashed #333;

      border-radius:24px;

      display:flex;
      align-items:center;
      justify-content:center;

      color:#666;
    }

    nav{
      position:fixed;

      bottom:0;
      left:0;
      right:0;

      height:80px;

      background:#0b0b10;

      border-top:1px solid #1d1d28;

      display:flex;
      align-items:center;
      justify-content:space-around;

      z-index:100;
    }

    nav button{
      background:none;
      border:none;

      color:#d0d0d0;

      font-size:14px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    Lobby<span>Live</span>
  </div>

  <input type="text" placeholder="Search live worlds..." />
</header>

<main>

  <h2>Live Lobby</h2>

  <div class="placeholder">
    Lobby posters will appear here
  </div>

</main>

<nav>
  <button>Home</button>
  <button>Live</button>
  <button>Explore</button>
  <button>Alerts</button>
  <button>Menu</button>
</nav>

</body>
</html>
